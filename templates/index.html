<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phishing Threat Detector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=1.3">
</head>
<body class="home-page">
  <video autoplay muted loop id="bg-video">
    <source src="{{ url_for('static', filename='video.mp4') }}" type="video/mp4">
  </video>
  <div class="page-shell">
    <header class="hero-card">
      <div class="hero-copy">
        <p class="eyebrow">BrowseSafe.AI</p>
        <h2>Check whether a website URL looks safe or suspicious.</h2>
        <p class="hero-text">
          Submit a website URL to inspect phishing indicators, view the model decision,
          and explore the strongest explanation signals behind the result.
        </p>
        <div style="margin-top: 32px;">
          <a href="/dashboard" style="display: inline-block; padding: 16px 32px; background: linear-gradient(180deg, #f74b55, #f23642); color: white; text-decoration: none; border-radius: 12px; font-weight: 600; font-size: 1.15rem; box-shadow: 0 8px 20px rgba(247, 75, 85, 0.3); transition: transform 0.2s;">Start Scanning</a>
        </div>
      </div>
      <div class="hero-badge">
        <span>AI Powered</span>
        <strong>Phishing Detector</strong>
      </div>
    </header>

    <footer class="site-footer">
      <p>Built by <a href="https://github.com/deon-george" target="_blank" rel="noopener noreferrer">deon-george</a> | <a href="https://github.com/dhanush35-lab" target="_blank" rel="noopener noreferrer">dhanush35-lab</a></p>
    </footer>
  </div>
</body>
</html>
